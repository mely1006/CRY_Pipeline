name: Pipeline Crypto

on:
  schedule:
    - cron: '0 * * * *'   # toutes les heures
  workflow_dispatch:        # permet de lancer manuellement aussi

jobs:
  pipeline:
    runs-on: ubuntu-latest  # GitHub fournit une machine Linux gratuite

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v3

      - name: Installer Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Installer les dépendances
        run: pip install -r requirements.txt

      - name: Lancer le pipeline
        run: python pipeline.py
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          EMAIL_EXPEDITEUR: ${{ secrets.EMAIL_EXPEDITEUR }}
          EMAIL_MOT_DE_PASSE: ${{ secrets.EMAIL_MOT_DE_PASSE }}

  rapport:
    runs-on: ubuntu-latest
    needs: pipeline           # attend que pipeline finisse avant de démarrer

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v3

      - name: Installer Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Installer les dépendances
        run: pip install -r requirements.txt

      - name: Envoyer le rapport email
        run: python rapport_email.py
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          EMAIL_EXPEDITEUR: ${{ secrets.EMAIL_EXPEDITEUR }}
          EMAIL_MOT_DE_PASSE: ${{ secrets.EMAIL_MOT_DE_PASSE }}